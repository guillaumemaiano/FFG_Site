{{ define "main" }}
  <article class="project-article">
    <header class="project-article__header">
      <h1>{{ .Title }}</h1>

      {{ with .Description }}
        <p class="project-article__description">{{ . }}</p>
      {{ end }}
    </header>

    <div class="project-article__content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
