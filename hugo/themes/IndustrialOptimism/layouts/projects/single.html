{{ define "main" }}
<article class="project-page">
  <header class="project-header">
    <h1>{{ .Title }}</h1>

    {{ with .Params.status }}
      <p class="project-status">{{ . }}</p>
    {{ end }}

    {{ with .Params.summary }}
      <p class="project-summary">{{ . }}</p>
    {{ end }}
  </header>

  <section class="project-content">
    {{ .Content }}
  </section>
</article>
{{end}}
