{{- $project := .project -}}
{{- $id := .id | default "" -}}
{{- $image := $project.Resources.GetMatch $project.Params.cover -}}

<article
  {{ with $id }}id="{{ . }}"{{ end }}
  class="project"
>
  {{ with $image }}
    <img
      class="project__image"
      src="{{ .RelPermalink }}"
      width="{{ .Width }}"
      height="{{ .Height }}"
      alt=""
    >
  {{ end }}

  <div class="project__shade"></div>

  <div class="site-frame project__content">
    <h1 class="project__title">{{ $project.LinkTitle }}</h1>

    {{ with $project.Params.tagline }}
      <p class="project__tagline">{{ . }}</p>
    {{ end }}

    <a class="project__cta" href="{{ $project.RelPermalink }}">
      {{ default "Enter" $project.Params.cta }}
      <span aria-hidden="true">→</span>
    </a>
  </div>
</article>
